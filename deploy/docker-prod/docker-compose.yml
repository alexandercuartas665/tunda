# Stack de PRODUCCION de DokTrino IPS RT.
#
# Diseño: el servidor YA tiene un reverse proxy global (nginx-proxy-manager,
# traefik, otro Caddy, etc.) en los puertos 80/443 que se encarga del SSL.
# Este compose expone doktrino-app en un puerto uncommon del host; tu reverse
# proxy global hace TLS termination y forwardea hacia ese puerto.
#
# Servicios:
#   - doktrino-app   : la consola Blazor (imagen de GHCR). Expuesta SOLO en
#                   ${DOKTRINO_PORT}; tu proxy global la alcanza.
#   - postgres    : base persistente. NO expuesta al host (solo red interna).
#
# Uso:
#   1) Copiar .env.example a .env y editar DOKTRINO_PORT, DOKTRINO_IMAGE, POSTGRES_*.
#   2) docker login ghcr.io (si la imagen sigue privada, con un PAT read:packages)
#   3) docker compose up -d
#   4) En tu reverse proxy global, agregar reverse_proxy hacia
#      http://localhost:${DOKTRINO_PORT}  (Blazor SignalR requiere WebSockets;
#      casi todos los proxies modernos los pasan por defecto).
#   5) Actualizar: docker compose pull && docker compose up -d

name: doktrino-prod

services:
  doktrino-app:
    # Cambia owner/repo si es tu fork. Default: la imagen publicada por el workflow.
    image: ${DOKTRINO_IMAGE:-ghcr.io/alexandercuartas665/doktrino/superadmin:latest}
    container_name: doktrino-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: 8080
      # Connection string apuntando al servicio postgres del compose (red interna).
      DOKTRINO_DB_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Aplica migrations EF al arrancar (idempotente).
      DOKTRINO_RUN_MIGRATIONS: "true"
      # Confianza al proxy global (TLS terminado afuera).
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    ports:
      # Publica al host en un puerto uncommon. Por default 5380 (ASCII de "S-D" : SuperAdmin).
      # Tu reverse proxy global apunta a http://localhost:${DOKTRINO_PORT}.
      - "${DOKTRINO_PORT:-5380}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doktrino-net
    # Sin healthcheck explicito: la imagen aspnet:9.0 (Debian slim) no trae
    # ni wget, ni curl, ni bash con /dev/tcp en sh. Mientras no agreguemos
    # curl al Dockerfile, el reverse proxy global hace su propio probe HTTP
    # contra /login. La app sigue gobernada por `restart: unless-stopped`.

  postgres:
    image: postgres:16-alpine
    container_name: doktrino-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - doktrino-pgdata:/var/lib/postgresql/data
    networks:
      - doktrino-net
    # En produccion NO publicamos al host. La BD solo se accede desde la red interna.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  doktrino-pgdata:

networks:
  doktrino-net:
    driver: bridge
