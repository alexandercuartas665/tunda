name: doktrino

services:
  postgres:
    image: postgres:16-alpine
    container_name: doktrino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - doktrino-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - doktrino-net

  redis:
    image: redis:7-alpine
    container_name: doktrino-redis
    restart: unless-stopped
    # Dev: sin contrasena (la app se conecta a localhost:6383 sin auth). Anadir --requirepass en prod.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6383}:6379"
    volumes:
      - doktrino-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - doktrino-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: doktrino-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5675}:5672"
      - "${RABBITMQ_MGMT_PORT:-15675}:15672"
    volumes:
      - doktrino-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - doktrino-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: doktrino-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL_USER:-admin}@${PGADMIN_EMAIL_DOMAIN:-doktrino.local}"
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5052}:80"
    volumes:
      - doktrino-pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doktrino-net

  minio:
    image: minio/minio:latest
    container_name: doktrino-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - doktrino-minio-data:/data
    networks:
      - doktrino-net

  # evolution-api:
  #   image: atendai/evolution-api:latest
  #   container_name: doktrino-evolution-api
  #   restart: unless-stopped
  #   environment:
  #     SERVER_URL: http://localhost:8081
  #     AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
  #   ports:
  #     - "${EVOLUTION_PORT:-8081}:8080"
  #   volumes:
  #     - doktrino-evolution-data:/evolution/instances
  #   networks:
  #     - doktrino-net

volumes:
  doktrino-postgres-data:
  doktrino-redis-data:
  doktrino-rabbitmq-data:
  doktrino-pgadmin-data:
  doktrino-minio-data:

networks:
  doktrino-net:
    name: doktrino-net
    driver: bridge
