name: Build & publish DokTrino image

# Publica la imagen Docker del DokTrino SuperAdmin a GitHub Container Registry (GHCR)
# en cada push a main, y al crear tags semver (vX.Y.Z) tambien la etiqueta como release.
# El servidor de produccion solo necesita hacer `docker compose pull && up`.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:  # tambien permite disparar manualmente desde la UI

env:
  REGISTRY: ghcr.io
  # GHCR exige minusculas; el repo se llama DOKTRINO (uppercase) por eso lo fijamos hardcoded.
  IMAGE_NAME: alexandercuartas665/doktrino/superadmin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile.superadmin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
